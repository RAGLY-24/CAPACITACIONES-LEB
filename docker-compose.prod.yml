services:
  app:
    build:
      context: ./backend-capacitaciones
      dockerfile: Dockerfile
      target: production
    container_name: leb_app
    restart: unless-stopped
    # El .env real vive en el servidor (no se versiona) y se monta tal cual.
    # public/ y storage/ se comparten con el contenedor de nginx (web) y
    # persisten en el host entre despliegues (uploads, logs, storage:link).
    volumes:
      - ./backend-capacitaciones/.env:/var/www/.env
      - ./backend-capacitaciones/storage:/var/www/storage
      - ./backend-capacitaciones/public:/var/www/public
    networks:
      - leb_network
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:alpine
    container_name: leb_web
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:80"
    volumes:
      - ./backend-capacitaciones/docker/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend-capacitaciones/public:/var/www/public:ro
      - ./backend-capacitaciones/storage:/var/www/storage:ro
    networks:
      - leb_network
    depends_on:
      - app

  frontend:
    build:
      context: ./frontend-capacitaciones
      dockerfile: Dockerfile
      args:
        # Debe apuntar a la URL pública donde quedará expuesta la API (servicio "web").
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: leb_frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - leb_network

  db:
    image: mysql:8.0
    container_name: leb_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - leb_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No se expone el puerto 3306 al host: solo la red interna de docker
    # necesita acceso a la base de datos en producción.

networks:
  leb_network:
    driver: bridge

volumes:
  db_data:
